# Homologação: sobe SÓ as imagens buildadas (web + api) publicadas no registry
# do Forgejo pela branch homolog (workflow tageia a branch com o próprio nome
# → tag "homolog"). Postgres, MinIO, Gotenberg e mail são serviços
# COMPARTILHADOS no servidor (comuns a vários sistemas) e NÃO sobem aqui — a
# api aponta para eles via .env, através da rede Docker externa compartilhada
# (SHARED_NETWORK). Nome de projeto próprio (easynr10-homolog) e portas
# HOMOLOG_* para conviver com a produção no mesmo host sem colidir.
# Deploy: docker compose -f docker-compose.homolog.yml pull && \
#         docker compose -f docker-compose.homolog.yml up -d
name: easynr10-homolog

services:
  web:
    image: ${REGISTRY_HOST:?defina REGISTRY_HOST}/pso/easynr10-web:${HOMOLOG_IMAGE_TAG:-homolog}
    restart: unless-stopped
    ports:
      - "${HOMOLOG_WEB_PORT:-8082}:80"
    depends_on:
      - api
    networks:
      - default
      - shared

  api:
    image: ${REGISTRY_HOST:?defina REGISTRY_HOST}/pso/easynr10-api:${HOMOLOG_IMAGE_TAG:-homolog}
    restart: unless-stopped
    environment:
      PORT: "3000"
      # ── Serviços compartilhados do servidor (via rede "shared") ──────────
      # Aponte para os hosts reais no .env; não há containers de banco/minio/
      # gotenberg/mail neste compose.
      DATABASE_URL: ${DATABASE_URL:?defina a URL do Postgres compartilhado}
      S3_ENDPOINT: ${S3_ENDPOINT:?endpoint interno do MinIO compartilhado}
      S3_PUBLIC_ENDPOINT: ${HOMOLOG_S3_PUBLIC_ENDPOINT:?endpoint público do MinIO (presigned URLs)}
      GOTENBERG_URL: ${GOTENBERG_URL:?URL do Gotenberg compartilhado}
      MAIL_HOST: ${MAIL_HOST:?host de e-mail compartilhado}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-easynr10@localhost}
      # ── App ──────────────────────────────────────────────────────────────
      FRONTEND_URL: ${HOMOLOG_FRONTEND_URL:?defina a URL pública de homologação}
      BETTER_AUTH_URL: ${HOMOLOG_FRONTEND_URL:?defina a URL pública de homologação}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?defina um segredo forte}
      EXTRA_TRUSTED_ORIGINS: ${EXTRA_TRUSTED_ORIGINS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?}
      S3_BUCKET: ${S3_BUCKET:-easynr10}
      S3_FORCE_PATH_STYLE: "true"
    networks:
      - default
      - shared

# Rede externa compartilhada onde vivem Postgres/MinIO/Gotenberg/mail e o
# proxy reverso do servidor. Crie uma vez: docker network create pso-shared
networks:
  shared:
    external: true
    name: ${SHARED_NETWORK:-pso-shared}
