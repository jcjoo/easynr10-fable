# Build e push das imagens (api e web) para o registry do próprio Forgejo a
# cada push em main OU homolog (pacotes ficam na org, não no ghcr). A tag =
# nome da branch (metadata-action type=ref,event=branch): main também ganha
# "latest" (usada pelo docker-compose.prod.yml); homolog gera a tag "homolog"
# (usada pelo docker-compose.homolog.yml). O owner é minusculado pelo
# metadata-action → as imagens saem como pso/easynr10-{api,web}.
# REGISTRY_HOST é variável de org no Forgejo (host do registry, visto pelo
# daemon docker do runner — ex.: localhost:3300 no teste local).
# Sem setup-buildx: o builder padrão (driver docker) builda e publica pelo
# daemon do host, único caminho que alcança um registry em localhost.
name: docker-images

on:
  push:
    branches: [main, homolog]
  workflow_dispatch:

jobs:
  build:
    # runner da org registrado com o rótulo "ubuntu-latest" (ver Settings →
    # Actions → Runners), mapeado para as imagens do catthehacker. O job
    # precisa de CLI do Docker + socket do host pra buildar.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: easynr10-api
            dockerfile: apps/api/Dockerfile
          - image: easynr10-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # DEBUG TEMPORÁRIO: descobrir com qual daemon o job fala e se ele tem o
      # insecure-registries. Remover assim que o login passar.
      - name: debug docker daemon
        run: |
          echo "DOCKER_HOST=${DOCKER_HOST:-<vazio>}"
          echo "REGISTRY_HOST=${{ vars.REGISTRY_HOST }}"
          echo "--- docker info ---"
          docker info 2>&1 | grep -iE "insecure|registry|server version|name:" || true
          echo "--- alcance do registry via HTTP ---"
          curl -s -o /dev/null -w "http  /v2/ -> %{http_code}\n" \
            "http://${{ vars.REGISTRY_HOST }}/v2/" || echo "curl http falhou"

      # REGISTRY_TOKEN: secret de org com um token write:package — o token
      # automático do job (GITHUB_TOKEN) não tem acesso ao registry de pacotes.
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_HOST }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
