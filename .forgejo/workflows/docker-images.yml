# Build e push das imagens (api e web) para o registry do próprio Forgejo a
# cada push na main. Com .forgejo/workflows presente, o Forgejo ignora o
# .github/workflows — que segue valendo para o espelho no GitHub (ghcr).
# REGISTRY_HOST é variável de org no Forgejo (host do registry, visto pelo
# daemon docker do runner — ex.: localhost:3300 no teste local).
# Sem setup-buildx: o builder padrão (driver docker) builda e publica pelo
# daemon do host, único caminho que alcança um registry em localhost.
name: docker-images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: easynr10-api
            dockerfile: apps/api/Dockerfile
          - image: easynr10-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_HOST }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
